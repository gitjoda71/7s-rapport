<script>
(function () {
  /* ─── Symbol-definitioner ─── */
  // Box: 120 × 100 svg-units. Vi använder transparent fyll om "ofylld" annars affiliation-färg.
  const COLORS = {
    'van':     { fill:'#5fafff', stroke:'#1565c0' },
    'fiende':  { fill:'#ff5c5c', stroke:'#b71c1c' },
    'neutral': { fill:'#7fd896', stroke:'#1b5e20' },
    'okand':   { fill:'#ffd166', stroke:'#8d6708' }
  };

  const AFF_LABEL  = { 'van':'Vän', 'fiende':'Fiende', 'neutral':'Neutral', 'okand':'Okänd' };
  const DIM_LABEL  = { 'luft':'Luft', 'mark':'Mark', 'sjo':'Sjö', 'uv':'Undervatten', 'mtrl':'Materiel' };

  // Ramformer per (affiliation, dimension). Origo 0,0 - 120,100. ikon-yta ca 30,25 - 90,80
  function framePath(aff, dim) {
    if (dim === 'luft') {
      if (aff === 'van')     return { d:'M10,90 Q60,10 110,90', closed:false };
      if (aff === 'fiende')  return { d:'M10,90 L10,45 L60,15 L110,45 L110,90', closed:false };
      if (aff === 'neutral') return { d:'M10,90 L10,15 L110,15 L110,90', closed:false };
      if (aff === 'okand')   return { d:'M30,90 C5,90 5,55 25,55 C25,30 60,30 60,55 C95,30 115,55 95,55 C115,90 90,90 90,90', closed:false };
    }
    if (dim === 'mark') {
      if (aff === 'van' || aff === 'neutral') {
        const fill = aff === 'neutral' ? COLORS.neutral.fill : COLORS.van.fill;
        const stroke = aff === 'neutral' ? COLORS.neutral.stroke : COLORS.van.stroke;
        return { kind:'rect', x:10, y:30, w:100, h:60, fill, stroke };
      }
      if (aff === 'fiende') return { kind:'poly', points:'60,15 110,55 60,95 10,55' };
      if (aff === 'okand')  return { kind:'cloverleaf' };
    }
    if (dim === 'sjo') {
      if (aff === 'van')     return { kind:'circle', cx:60, cy:55, r:40 };
      if (aff === 'fiende')  return { kind:'poly', points:'60,15 110,55 60,95 10,55' };
      if (aff === 'neutral') return { kind:'rect', x:10, y:30, w:100, h:60 };
      if (aff === 'okand')   return { kind:'cloverleaf' };
    }
    if (dim === 'uv') {
      if (aff === 'van')     return { d:'M10,15 Q60,95 110,15', closed:false };
      if (aff === 'fiende')  return { d:'M10,15 L10,55 L60,90 L110,55 L110,15', closed:false };
      if (aff === 'neutral') return { d:'M10,15 L10,90 L110,90 L110,15', closed:false };
      if (aff === 'okand')   return { kind:'cloverleaf', inverted:true };
    }
    if (dim === 'mtrl') {
      if (aff === 'van')     return { kind:'circle', cx:60, cy:55, r:40 };
      if (aff === 'fiende')  return { kind:'poly', points:'60,15 110,55 60,95 10,55' };
      if (aff === 'neutral') return { kind:'rect', x:10, y:30, w:100, h:60 };
      if (aff === 'okand')   return { kind:'cloverleaf' };
    }
    return null;
  }

  function cloverleafPath(inverted) {
    // Fyrklöver/moln-form. ungefärligt.
    if (inverted) {
      return 'M25,90 a18,18 0 0 1 0,-30 a18,18 0 0 1 25,-15 a18,18 0 0 1 35,0 a18,18 0 0 1 25,15 a18,18 0 0 1 0,30 Z';
    }
    return 'M25,20 a18,18 0 0 0 0,30 a18,18 0 0 0 25,15 a18,18 0 0 0 35,0 a18,18 0 0 0 25,-15 a18,18 0 0 0 0,-30 a18,18 0 0 0 -25,-15 a18,18 0 0 0 -35,0 a18,18 0 0 0 -25,15 Z';
  }

  /* ─── Ikoner — enkla SVG-pathar i ikon-ytan ─── */
  const ICONS = {
    'inget':    { label:'(ingen)', draw:() => '' },
    'inf':      { label:'Infanteri (X)',         draw:(c) => `<line x1="${c.x1}" y1="${c.y1}" x2="${c.x2}" y2="${c.y2}" stroke="${c.s}" stroke-width="2.5"/><line x1="${c.x2}" y1="${c.y1}" x2="${c.x1}" y2="${c.y2}" stroke="${c.s}" stroke-width="2.5"/>` },
    'pansar':   { label:'Pansar (oval)',         draw:(c) => `<ellipse cx="60" cy="${(c.y1+c.y2)/2}" rx="22" ry="11" fill="none" stroke="${c.s}" stroke-width="2.5"/>` },
    'pv':       { label:'Pansarvärn (Λ)',        draw:(c) => `<polyline points="${c.x1},${c.y2} 60,${c.y1} ${c.x2},${c.y2}" fill="none" stroke="${c.s}" stroke-width="2.5"/>` },
    'art':      { label:'Artilleri (●)',         draw:(c) => `<circle cx="60" cy="${(c.y1+c.y2)/2}" r="5.5" fill="${c.s}"/>` },
    'grk':      { label:'Granatkastare (↑)',     draw:(c) => `<line x1="60" y1="${c.y2}" x2="60" y2="${c.y1+4}" stroke="${c.s}" stroke-width="2.5"/><polyline points="55,${c.y1+8} 60,${c.y1+2} 65,${c.y1+8}" fill="none" stroke="${c.s}" stroke-width="2.5"/>` },
    'lv':       { label:'Luftvärn (∩)',          draw:(c) => `<path d="M${c.x1+5},${c.y2} Q60,${c.y1-5} ${c.x2-5},${c.y2}" fill="none" stroke="${c.s}" stroke-width="2.5"/>` },
    'sjv':      { label:'Sjukvård (+)',          draw:(c) => `<line x1="60" y1="${c.y1+4}" x2="60" y2="${c.y2-4}" stroke="${c.s}" stroke-width="3.5"/><line x1="${c.x1+6}" y1="${(c.y1+c.y2)/2}" x2="${c.x2-6}" y2="${(c.y1+c.y2)/2}" stroke="${c.s}" stroke-width="3.5"/>` },
    'rec':      { label:'Spaning (\\)',          draw:(c) => `<line x1="${c.x1+4}" y1="${c.y1+4}" x2="${c.x2-4}" y2="${c.y2-4}" stroke="${c.s}" stroke-width="2.5"/>` },
    'hkp':      { label:'Helikopter (bog-fluga)', draw:(c) => `<line x1="${c.x1+4}" y1="${(c.y1+c.y2)/2}" x2="${c.x2-4}" y2="${(c.y1+c.y2)/2}" stroke="${c.s}" stroke-width="2.5"/><polygon points="${c.x1+4},${(c.y1+c.y2)/2-6} ${c.x1+14},${(c.y1+c.y2)/2} ${c.x1+4},${(c.y1+c.y2)/2+6}" fill="${c.s}"/><polygon points="${c.x2-4},${(c.y1+c.y2)/2-6} ${c.x2-14},${(c.y1+c.y2)/2} ${c.x2-4},${(c.y1+c.y2)/2+6}" fill="${c.s}"/>` },
    'uav':      { label:'UAV (drone)',           draw:(c) => `<line x1="${c.x1+4}" y1="${(c.y1+c.y2)/2}" x2="${c.x2-4}" y2="${(c.y1+c.y2)/2}" stroke="${c.s}" stroke-width="2.5"/><polygon points="${c.x1+4},${(c.y1+c.y2)/2-6} ${c.x1+14},${(c.y1+c.y2)/2} ${c.x1+4},${(c.y1+c.y2)/2+6}" fill="none" stroke="${c.s}" stroke-width="2"/><polygon points="${c.x2-4},${(c.y1+c.y2)/2-6} ${c.x2-14},${(c.y1+c.y2)/2} ${c.x2-4},${(c.y1+c.y2)/2+6}" fill="none" stroke="${c.s}" stroke-width="2"/>` }
  };

  /* ─── Förbandsstorlek-modifierare (ovanför ramen) ─── */
  const SIZES = [
    { id:'none',   label:'(ingen)' },
    { id:'grupp', label:'Grupp •',         render:'<circle cx="60" cy="6" r="3" fill="currentColor"/>' },
    { id:'tropp', label:'Tropp ••',        render:'<circle cx="53" cy="6" r="3" fill="currentColor"/><circle cx="67" cy="6" r="3" fill="currentColor"/>' },
    { id:'plut',  label:'Pluton •••',      render:'<circle cx="46" cy="6" r="3" fill="currentColor"/><circle cx="60" cy="6" r="3" fill="currentColor"/><circle cx="74" cy="6" r="3" fill="currentColor"/>' },
    { id:'komp',  label:'Kompani |',       render:'<line x1="60" y1="0" x2="60" y2="12" stroke="currentColor" stroke-width="2.5"/>' },
    { id:'bat',   label:'Bataljon ||',     render:'<line x1="54" y1="0" x2="54" y2="12" stroke="currentColor" stroke-width="2.5"/><line x1="66" y1="0" x2="66" y2="12" stroke="currentColor" stroke-width="2.5"/>' },
    { id:'reg',   label:'Regemente |||',   render:'<line x1="48" y1="0" x2="48" y2="12" stroke="currentColor" stroke-width="2.5"/><line x1="60" y1="0" x2="60" y2="12" stroke="currentColor" stroke-width="2.5"/><line x1="72" y1="0" x2="72" y2="12" stroke="currentColor" stroke-width="2.5"/>' },
    { id:'brig',  label:'Brigad X',        render:'<text x="60" y="11" text-anchor="middle" font-size="13" font-weight="700" fill="currentColor">X</text>' },
    { id:'div',   label:'Division XX',     render:'<text x="60" y="11" text-anchor="middle" font-size="13" font-weight="700" fill="currentColor">XX</text>' },
    { id:'kar',   label:'Kår XXX',         render:'<text x="60" y="11" text-anchor="middle" font-size="13" font-weight="700" fill="currentColor">XXX</text>' },
    { id:'arme',  label:'Armé XXXX',       render:'<text x="60" y="11" text-anchor="middle" font-size="13" font-weight="700" fill="currentColor">XXXX</text>' }
  ];

  /* ─── State ─── */
  const state = {
    aff: 'van',
    dim: 'mark',
    icon: 'inf',
    size: 'plut',
    status: 'present'  // present | planned
  };

  /* ─── SVG-rendering ─── */
  function buildSvg(s, opts) {
    opts = opts || {};
    const w = 140, h = 130;
    const col = COLORS[s.aff];
    const fr = framePath(s.aff, s.dim);
    const dashed = s.status === 'planned' ? ' stroke-dasharray="5,3"' : '';
    const fill = (s.dim === 'luft' || s.dim === 'uv') ? 'none' : col.fill;

    let frameSvg = '';
    if (fr) {
      if (fr.kind === 'rect') {
        frameSvg = `<rect x="${fr.x}" y="${fr.y}" width="${fr.w}" height="${fr.h}" fill="${fr.fill || col.fill}" stroke="${fr.stroke || col.stroke}" stroke-width="2.5"${dashed}/>`;
      } else if (fr.kind === 'circle') {
        frameSvg = `<circle cx="${fr.cx}" cy="${fr.cy}" r="${fr.r}" fill="${col.fill}" stroke="${col.stroke}" stroke-width="2.5"${dashed}/>`;
      } else if (fr.kind === 'poly') {
        frameSvg = `<polygon points="${fr.points}" fill="${col.fill}" stroke="${col.stroke}" stroke-width="2.5"${dashed}/>`;
      } else if (fr.kind === 'cloverleaf') {
        frameSvg = `<path d="${cloverleafPath(fr.inverted)}" fill="${col.fill}" stroke="${col.stroke}" stroke-width="2.5"${dashed}/>`;
      } else if (fr.d) {
        // Linje-bara (luft/uv): inget fyll, bara stroke
        frameSvg = `<path d="${fr.d}" fill="none" stroke="${col.stroke}" stroke-width="2.5"${dashed}/>`;
      }
    }

    // Ikon-yta (clamp inom ramen)
    const iconCoords = { x1:28, y1:s.dim==='uv'?22:32, x2:92, y2:s.dim==='uv'?78:78, s:col.stroke };
    if (s.dim === 'luft') { iconCoords.y1 = 38; iconCoords.y2 = 80; }
    if (s.dim === 'mtrl' || s.dim === 'sjo') { iconCoords.y1 = 38; iconCoords.y2 = 74; }
    const iconSvg = (ICONS[s.icon] && ICONS[s.icon].draw) ? ICONS[s.icon].draw(iconCoords) : '';

    // Förbandsstorlek (ovanför ramen — gäller bara förbandssymboler, dvs ej mtrl)
    let sizeSvg = '';
    if (s.size !== 'none' && s.dim !== 'mtrl') {
      const sz = SIZES.find(x => x.id === s.size);
      if (sz && sz.render) sizeSvg = `<g style="color:${col.stroke}" transform="translate(10,3)">${sz.render}</g>`;
    }

    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w*2}" height="${h*2}" viewBox="0 0 ${w} ${h}">${sizeSvg}<g transform="translate(10,15)">${frameSvg}${iconSvg}</g></svg>`;
    return svg;
  }

  function describe(s) {
    const sz = SIZES.find(x => x.id === s.size);
    const ic = ICONS[s.icon];
    const parts = [AFF_LABEL[s.aff], DIM_LABEL[s.dim]];
    if (s.dim !== 'mtrl' && s.size !== 'none' && sz) parts.push(sz.label.split(' ')[0]);
    if (s.icon !== 'inget' && ic) parts.push(ic.label.split(' ')[0]);
    if (s.status === 'planned') parts.push('(planerad)');
    return parts.join(' · ');
  }

  /* ─── Bygg-läge ─── */
  function renderBuild() {
    const $c = document.getElementById('modeContent');
    $c.innerHTML = '';

    const preview = document.createElement('div');
    preview.className = 'panel preview';
    preview.innerHTML = `<div class="preview-svg" id="previewSvg"></div><div class="preview-label" id="previewLabel"></div>`;
    $c.appendChild(preview);

    const sections = [
      { title:'Affiliation', key:'aff', opts:[['van','Vän'],['fiende','Fiende'],['neutral','Neutral'],['okand','Okänd']] },
      { title:'Battle dimension', key:'dim', opts:[['luft','Luft'],['mark','Mark'],['sjo','Sjö'],['uv','Undervatten'],['mtrl','Materiel']] },
      { title:'Status', key:'status', opts:[['present','Befintlig (heldragen)'],['planned','Planerad (streckad)']] },
      { title:'Förbandsstorlek', key:'size', opts: SIZES.map(s => [s.id, s.label]) },
      { title:'Ikon', key:'icon', opts: Object.entries(ICONS).map(([k,v]) => [k, v.label]) }
    ];

    sections.forEach(sec => {
      const p = document.createElement('div');
      p.className = 'panel';
      p.innerHTML = `<h2>${sec.title}</h2><div class="pills" data-key="${sec.key}"></div>`;
      const pills = p.querySelector('.pills');
      sec.opts.forEach(([val, label]) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'pill' + (state[sec.key] === val ? ' active' : '');
        b.textContent = label;
        b.dataset.val = val;
        b.addEventListener('click', () => { state[sec.key] = val; renderBuild(); });
        pills.appendChild(b);
      });
      $c.appendChild(p);
    });

    const actions = document.createElement('div');
    actions.className = 'panel actions';
    actions.innerHTML = `<button class="btn" type="button" id="copySvg">Kopiera SVG</button><button class="btn btn-primary" type="button" id="downloadSvg">Ladda ner SVG</button>`;
    $c.appendChild(actions);

    // Update preview
    document.getElementById('previewSvg').innerHTML = buildSvg(state);
    document.getElementById('previewLabel').textContent = describe(state);

    document.getElementById('copySvg').addEventListener('click', () => {
      const svg = buildSvg(state);
      navigator.clipboard.writeText(svg).then(
        () => { document.getElementById('previewLabel').textContent = describe(state) + ' — kopierad'; },
        () => { document.getElementById('previewLabel').textContent = describe(state) + ' — kopiering misslyckades'; }
      );
    });
    document.getElementById('downloadSvg').addEventListener('click', () => {
      const svg = buildSvg(state);
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `app6-${state.aff}-${state.dim}-${state.icon}-${state.size}.svg`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 100);
    });
  }

  /* ─── Mystery-läge ─── */
  function newMystery() {
    const affs = ['van','fiende','neutral','okand'];
    const dims = ['luft','mark','sjo','uv','mtrl'];
    const iconKeys = Object.keys(ICONS).filter(k => k !== 'inget');
    const sizeKeys = SIZES.map(s => s.id).filter(s => s !== 'none');
    return {
      aff: affs[Math.floor(Math.random()*affs.length)],
      dim: dims[Math.floor(Math.random()*dims.length)],
      icon: Math.random() < 0.6 ? iconKeys[Math.floor(Math.random()*iconKeys.length)] : 'inget',
      size: Math.random() < 0.6 ? sizeKeys[Math.floor(Math.random()*sizeKeys.length)] : 'none',
      status: 'present'
    };
  }

  let mystery = null;
  let mysteryGuess = null;

  function renderQuiz() {
    const $c = document.getElementById('modeContent');
    $c.innerHTML = '';

    if (!mystery) mystery = newMystery();
    if (!mysteryGuess) mysteryGuess = { aff:null, dim:null };

    const preview = document.createElement('div');
    preview.className = 'panel preview';
    preview.innerHTML = `<div class="preview-svg">${buildSvg(mystery)}</div><div class="preview-label">Vad ser du? Gissa affiliation och battle dimension.</div>`;
    $c.appendChild(preview);

    // Pillar för affiliation
    const aSec = document.createElement('div');
    aSec.className = 'panel';
    aSec.innerHTML = `<h2>Affiliation</h2><div class="pills" id="qAff"></div>`;
    ['van','fiende','neutral','okand'].forEach(v => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'pill' + (mysteryGuess.aff === v ? ' active' : '');
      b.textContent = AFF_LABEL[v];
      b.addEventListener('click', () => { mysteryGuess.aff = v; renderQuiz(); });
      aSec.querySelector('#qAff').appendChild(b);
    });
    $c.appendChild(aSec);

    const dSec = document.createElement('div');
    dSec.className = 'panel';
    dSec.innerHTML = `<h2>Battle dimension</h2><div class="pills" id="qDim"></div>`;
    ['luft','mark','sjo','uv','mtrl'].forEach(v => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'pill' + (mysteryGuess.dim === v ? ' active' : '');
      b.textContent = DIM_LABEL[v];
      b.addEventListener('click', () => { mysteryGuess.dim = v; renderQuiz(); });
      dSec.querySelector('#qDim').appendChild(b);
    });
    $c.appendChild(dSec);

    const act = document.createElement('div');
    act.className = 'panel actions';
    act.innerHTML = `<button class="btn" type="button" id="qSkip">Ny</button><button class="btn btn-primary" type="button" id="qCheck"${(mysteryGuess.aff && mysteryGuess.dim) ? '' : ' disabled'}>Kontrollera</button>`;
    $c.appendChild(act);

    document.getElementById('qSkip').addEventListener('click', () => {
      mystery = newMystery(); mysteryGuess = { aff:null, dim:null }; renderQuiz();
    });
    document.getElementById('qCheck').addEventListener('click', () => {
      const ok = (mysteryGuess.aff === mystery.aff) && (mysteryGuess.dim === mystery.dim);
      const fb = document.createElement('div');
      fb.className = 'quiz-feedback ' + (ok ? 'correct' : 'partial');
      fb.textContent = ok ? `Rätt — ${describe(mystery)}` : `Rätt svar: ${AFF_LABEL[mystery.aff]} · ${DIM_LABEL[mystery.dim]}`;
      preview.appendChild(fb);
      document.getElementById('qCheck').disabled = true;
      setTimeout(() => {
        mystery = newMystery(); mysteryGuess = { aff:null, dim:null }; renderQuiz();
      }, ok ? 1100 : 2400);
    });
  }

  /* ─── Mode-växel ─── */
  function setMode(m) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    if (m === 'build') renderBuild();
    else if (m === 'quiz') { mystery = null; mysteryGuess = null; renderQuiz(); }
  }
  document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
  setMode('build');
})();
</script>

<script src="pwa.js" defer></script>
</body>
