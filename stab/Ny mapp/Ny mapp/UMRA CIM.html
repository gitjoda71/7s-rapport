<!DOCTYPE html>
<html lang="sv">
<head>

<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f8f8f5;
    font-family: Georgia, serif;
  }
  svg {
    width: 360px;
    height: 540px;
    overflow: visible;
  }
  .controls {
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    color: #444;
  }
  input[type=range] {
    width: 260px;
    accent-color: #111;
  }
  .deg {
    min-width: 38px;
    font-variant-numeric: tabular-nums;
    color: #111;
  }

  <!-- ══ FIXED: white clearing disk + star ══ -->
  <circle cx="130" cy="248" r="26" fill="white"/>
  <path d="M 130,216 Q 140,239 162,248 Q 140,257 130,280 Q 120,257 98,248 Q 120,239 130,216 Z"
        fill="#111"/>

  <!-- ══ FIXED: CIM label — draggable via mouse / long-press ══
       Start: star outer edge (162) + 33% of loop diam (34) = x=196, y=260 -->
  <text id="cim" x="196" y="260"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="26"
        fill="#111"
        letter-spacing="1"
        cursor="grab"
        style="user-select:none;-webkit-user-select:none;">CIM</text>

  <!-- Drag-hint ring (hidden by default, shown during long-press countdown) -->
  <circle id="hint" cx="196" cy="260" r="18"
          fill="none" stroke="#aaa" stroke-width="1.5"
          stroke-dasharray="4 3" opacity="0"/>

</svg>

<div class="controls">
  <span>Rotera pärlor</span>
  <input type="range" id="rot" min="0" max="360" value="0" step="1">
  <span class="deg" id="deg">0°</span>
</div>

<script>
  /* ── bead rotation ── */
  const slider = document.getElementById('rot');
  const beads  = document.getElementById('beads');
  const degLbl = document.getElementById('deg');
  slider.addEventListener('input', function () {
    beads.setAttribute('transform', `rotate(${this.value},130,248)`);
    degLbl.textContent = this.value + '°';
  });

  /* ── CIM drag ── */
  const svg  = document.getElementById('umra');
  const cim  = document.getElementById('cim');
  const hint = document.getElementById('hint');

  let dragging   = false;
  let longTimer  = null;
  let startClient = null;   // {x,y} of pointer at dragstart
  let startSVG    = null;   // SVG-coord of text anchor at dragstart

  /* Convert client px → SVG user-units */
  function clientToSVG(cx, cy) {
    const pt = svg.createSVGPoint();
    pt.x = cx; pt.y = cy;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  function beginDrag(clientX, clientY) {
    dragging = true;
    cim.style.cursor = 'grabbing';
    hint.setAttribute('opacity', '0');
    startClient = { x: clientX, y: clientY };
    const sp = clientToSVG(clientX, clientY);
    // offset from pointer to text anchor
    startSVG = {
      dx: parseFloat(cim.getAttribute('x')) - sp.x,
      dy: parseFloat(cim.getAttribute('y')) - sp.y
    };
  }

  function moveDrag(clientX, clientY) {
    if (!dragging) return;
    const p = clientToSVG(clientX, clientY);
    cim.setAttribute('x', p.x + startSVG.dx);
    cim.setAttribute('y', p.y + startSVG.dy);
  }

  function endDrag() {
    dragging = false;
    cim.style.cursor = 'grab';
    clearTimeout(longTimer);
    hint.setAttribute('opacity', '0');
  }

  /* ── MOUSE events (desktop) ── */
  cim.addEventListener('mousedown', function (e) {
    e.preventDefault();
    beginDrag(e.clientX, e.clientY);
  });
  window.addEventListener('mousemove', function (e) {
    moveDrag(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', endDrag);

  /* ── TOUCH events (mobile) — long-press activates drag ── */
  const LONG_MS = 450;   // ms hold before drag unlocks

  cim.addEventListener('touchstart', function (e) {
    const t = e.touches[0];
    startClient = { x: t.clientX, y: t.clientY };

    /* show hint ring at text position */
    const sp = clientToSVG(t.clientX, t.clientY);
    hint.setAttribute('cx', parseFloat(cim.getAttribute('x')) + 20);
    hint.setAttribute('cy', parseFloat(cim.getAttribute('y')) - 8);
    hint.setAttribute('opacity', '0.7');

    longTimer = setTimeout(function () {
      hint.setAttribute('opacity', '0');
      beginDrag(startClient.x, startClient.y);
    }, LONG_MS);
  }, { passive: true });

  cim.addEventListener('touchmove', function (e) {
    const t = e.touches[0];
    /* cancel long-press if finger moves too much before timer fires */
    if (!dragging) {
      const dx = t.clientX - startClient.x;
      const dy = t.clientY - startClient.y;
      if (Math.sqrt(dx*dx + dy*dy) > 8) {
        clearTimeout(longTimer);
        hint.setAttribute('opacity', '0');
      }
    }
    if (dragging) {
      e.preventDefault();
      moveDrag(t.clientX, t.clientY);
    }
  }, { passive: false });

  cim.addEventListener('touchend', endDrag);
  cim.addEventListener('touchcancel', endDrag);
</script>

</body>
</html>
