project_name: "STAB 7S Infokarta"
description: >
  A single-page military intelligence map application (HTML/CSS/JS) for displaying
  7S field reports on a dark-themed Leaflet map. Designed for Swedish Home Guard
  (Hemvärn) headquarters staff to monitor incoming field reports in real-time.
  Features report list panel, map markers, selection/beacon animation, SVG arrow
  overlay, filter, sound alerts, and simulated incoming reports.

tech_stack:
  frontend:
    - HTML5 (single file, no build step)
    - CSS3 (custom properties, animations, backdrop-filter)
    - Vanilla JavaScript (ES6+)
    - Leaflet.js 1.9.4 (via CDN unpkg)
    - CartoDB dark_all tile layer
    - Web Audio API (procedural blip sounds)
    - SVG (arrow overlay)

features:
  - Dark military intelligence theme ("Jason Bourne" aesthetic)
  - Interactive Leaflet map centered on Stockholm (lat 59.334, lon 18.065)
  - 5 pre-loaded mock 7S reports with lat/lon coordinates
  - 1 simulated incoming report injected after 7 seconds
  - Color-coded map markers by symbol field (Röd/Svart/Grön/Gul/Vit/Blå/Kamouflage)
  - Stale intelligence indicators (reports > 4 hours old fade to 35% opacity)
  - Side panel (right, 340px) with scrollable report list sorted newest-first
  - Text filter for slag/sagesman/plats/symbol/sysselsättning fields
  - Report count display
  - Click on list item or map marker: selects report
  - Selection triggers: beacon animation (3 pulsing rings), map pan, info panel, SVG arrow
  - SVG dashed arrow from list item to map pin (redraws on map move)
  - Info panel (bottom-left): shows all 7S fields, anteckningar, pending warning
  - Toggle-off: clicking same report again deselects
  - PANEL button: hides/shows side panel (clean mode)
  - LJUD button: toggles Web Audio API blip sounds on/off
  - Military clock in top bar (DDHHMM Z format, updates every second)
  - Status bar at bottom with system messages
  - Pending reports: amber left-border + "AVVAKTA" badge
  - New incoming flash animation (3x green flash on list item)
  - Responsive: panel goes full-width on mobile (<600px)
  - Mouse wheel zoom, double-click zoom (Leaflet defaults)
  - Stale marker updater runs every 60 seconds

known_limitations:
  - No backend/WebSocket (mock data only)
  - No authentication
  - Single HTML file, no module system
  - Audio requires user gesture before first play (browser policy)
  - Arrow uses getBoundingClientRect which may be off if panel is hidden
  - markerElMap declared but never populated (unused variable)
  - symColor uses local variable named 'map' which shadows global Leaflet map (minor, different scope)

entry_point: index.html
language: sv
