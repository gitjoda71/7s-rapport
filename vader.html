    <style>
        :root {
            --bg-primary:#0d1f0d;--bg-secondary:#152815;--bg-card:#1a321a;--bg-input:#0f240f;
            --border:#2d4a2d;--border-focus:#4a7c4a;--text-primary:#e8f0e8;--text-secondary:#8aaa8a;
            --text-muted:#5a7a5a;--accent:#4caf50;--accent-hover:#66bb6a;--accent-dim:#1e3d1e;
            --danger:#c62828;--info:#1565c0;--info-hover:#1976d2;
            --radius:8px;--radius-sm:4px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 16px; overflow-y: scroll; }
        .container { max-width: 560px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0 16px; }
        header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
        header p { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.06em; margin-top: 2px; }
        .tab-nav { display: flex; gap: 4px; margin-bottom: 4px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
        .tab-link { flex: 1; text-align: center; padding: 9px 2px; border-radius: var(--radius-sm); color: var(--text-muted); text-decoration: none; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; transition: background 0.15s, color 0.15s; -webkit-tap-highlight-color: transparent; }
        .tab-link:hover { background: var(--bg-card); color: var(--text-secondary); }
        .tab-link.active { background: var(--accent-dim); color: var(--accent); }
        .tab-nav-sub { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 4px; margin-bottom: 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
        .tab-nav-sub .tab-link { font-size: 0.75rem; padding: 9px 2px; letter-spacing: 0.05em; }
        .status-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
        .status-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
        .status-row:last-child { margin-bottom: 0; }
        .status-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); flex-shrink: 0; width: 60px; }
        .status-value { font-size: 0.92rem; font-family: 'Courier New', monospace; color: var(--text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .status-value.empty { color: var(--text-muted); font-style: italic; }
        .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 48px; padding: 12px 20px; border: none; border-radius: var(--radius); font-family: inherit; font-size: 0.95rem; font-weight: 600; letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { width: 100%; background: var(--accent); color: #fff; margin-top: 8px; font-size: 1rem; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-sm { min-height: 40px; padding: 8px 14px; border-radius: var(--radius-sm); font-size: 0.85rem; white-space: nowrap; flex-shrink: 0; }
        .btn-time { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--border); }
        .btn-time:hover { background: var(--border-focus); }
        .btn-copy { width: 100%; background: var(--info); color: #fff; margin-bottom: 12px; }
        .btn-copy:hover { background: var(--info-hover); }

        .btn-secondary { flex: 1; background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-danger { flex: 1; background: var(--danger); color: #fff; border: none; }
        .button-group { display: flex; gap: 10px; }
        .copy-feedback { text-align: center; color: var(--accent); font-size: 0.85rem; font-weight: 600; height: 24px; opacity: 0; transition: opacity 0.2s; margin-bottom: 12px; }
        .copy-feedback.show { opacity: 1; }
        .prompt-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-family: 'Courier New', monospace; font-size: 0.82rem; line-height: 1.7; white-space: pre-wrap; color: var(--text-primary); margin-bottom: 14px; user-select: all; }
        .result-view { display: none; }
        .result-view.active { display: block; }
        .form-view.hidden { display: none; }
        .result-header { font-size: 0.8rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); text-align: center; margin-bottom: 12px; }
        .hint { font-size: 0.72rem; color: var(--text-muted); text-align: center; margin-bottom: 14px; line-height: 1.5; }
        .info-text { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 6px; }
        .input-row { display: flex; gap: 8px; }
        .input-row input { flex: 1; min-width: 0; }
        input[type="text"] { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit; font-size: 0.92rem; padding: 11px 12px; outline: none; -webkit-appearance: none; }
        input[type="text"]:focus { border-color: var(--border-focus); }
        input[type="text"]::placeholder { color: var(--text-muted); }
    </style>
</head>
<body>
<div class="container">
    <header><h1>VÄDER</h1><p>Meteorologisk prognos – militärt format</p></header>

    <nav class="tab-nav-sub">
        <a href="obslosa.html" class="tab-link">OBSLÖSA</a>
        <a href="fors.html" class="tab-link">FORS</a>
        <a href="pedars.html" class="tab-link">PEDARS</a>
        <a href="postschema.html" class="tab-link">SCHEMA</a>
        <a href="eobusare.html" class="tab-link">EOBUSARE</a>

    <main>
    <div class="form-view" id="formView">

        <div class="status-box">
            <div class="status-row">
                <span class="status-label">DATUM</span>
                <span class="status-value empty" id="dispDatum">— tryck Nu</span>
                <button class="btn btn-sm btn-time" onclick="setNu()">Nu</button>
            </div>
        </div>

        <div class="status-box">
            <div class="info-text">Plats / koordinater</div>
            <div class="input-row">
                <input type="text" id="ortInput" placeholder="Stockholm, Sverige" autocomplete="off">
                <button class="btn btn-sm btn-time" id="mgrsBtn" onclick="hamtaOrt()">📍 MGRS</button>
            </div>
        </div>

        <button class="btn btn-primary" onclick="generera()">Generera väderrapport</button>
    </div>

    <div class="result-view" id="resultView">
        <div class="result-header">VÄDERRAPPORT</div>
        <div class="prompt-box" id="promptOutput" contenteditable="true"></div>
        <button class="btn btn-copy" onclick="kopiera()">Kopiera till urklipp</button>
        <div class="copy-feedback" id="copyFeedback">✓ Kopierat</div>
        <div class="button-group" style="margin-top:8px">
            <button class="btn btn-secondary" onclick="document.getElementById('promptOutput').focus()">Redigera</button>
            <button class="btn btn-danger" onclick="nollstall()">Nollställ</button>
        </div>
    </div>

    </main>
</div>

<script>
let datumVal = '';
let ortVal   = '';
let latVal   = null;
let lonVal   = null;

function setNu() {
    const now = new Date();
    const p = n => String(n).padStart(2, '0');
    const yy = String(now.getFullYear()).slice(2);
    datumVal = yy + p(now.getMonth() + 1) + p(now.getDate());
    const el = document.getElementById('dispDatum');
    el.textContent = datumVal;
    el.classList.remove('empty');
}

function hamtaOrt() {
    const btn = document.getElementById('mgrsBtn');
    btn.textContent = '…';
    btn.disabled = true;
    if (!navigator.geolocation) {
        btn.textContent = '📍 MGRS'; btn.disabled = false; return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
        latVal = pos.coords.latitude;
        lonVal = pos.coords.longitude;
        const lat = latVal.toFixed(5);
        const lon = lonVal.toFixed(5);
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=sv`)
            .then(r => r.json())
            .then(d => {
                const city = d.address?.city || d.address?.town || d.address?.village || d.address?.county || `${lat}, ${lon}`;
                document.getElementById('ortInput').value = city;
            })
            .catch(() => {
                document.getElementById('ortInput').value = `${lat}, ${lon}`;
            })
            .finally(() => { btn.textContent = '📍 MGRS'; btn.disabled = false; });
    }, () => {
        btn.textContent = '📍 MGRS'; btn.disabled = false;
    });
}

// ÅÅMMDD → YYYY-MM-DD
function toISODate(yymmdd) {
    return '20' + yymmdd.slice(0,2) + '-' + yymmdd.slice(2,4) + '-' + yymmdd.slice(4,6);
}

// ISO datetime string (e.g. "2026-03-27T06:15") → DDTTMM
function toDDTTMM(isoStr) {
    const d = new Date(isoStr);
    const p = n => String(n).padStart(2,'0');
    return p(d.getDate()) + p(d.getHours()) + p(d.getMinutes());
}

// Add minutes to ISO datetime string
function addMinutes(isoStr, mins) {
    const d = new Date(isoStr);
    d.setMinutes(d.getMinutes() + mins);
    const p = n => String(n).padStart(2,'0');
    return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + 'T' + p(d.getHours()) + ':' + p(d.getMinutes());
}

// Degrees → Swedish cardinal
function vindRiktning(deg) {
    const dirs = ['N','NO','Ö','SO','S','SV','V','NV'];
    return dirs[Math.round(deg / 45) % 8];
}

// Wind speed (m/s) → description
function vindBeskriv(ms) {
    if (ms < 1)  return 'Vindstilla';
    if (ms < 4)  return 'Svag vind';
    if (ms < 8)  return 'Måttlig vind';
    if (ms < 14) return 'Frisk vind';
    if (ms < 20) return 'Hård vind';
    return 'Stormvind';
}

// Cloud cover % → sky description
function molnBeskriv(cc) {
    if (cc < 20)  return 'Klart';
    if (cc < 45)  return 'Lätt molnigt';
    if (cc < 70)  return 'Halvklart';
    return 'Mulet';
}

// UAV assessment
function uavBedomning(windMs, cloudPct, precip) {
    let parts = [];
    if (windMs >= 10)      parts.push('UAV-verksamhet starkt begränsad pga hård vind');
    else if (windMs >= 6)  parts.push('Begränsad UAV-verksamhet, måttlig vind');
    else                   parts.push('Inga begränsningar UAV, gynnsamma vindförhållanden');
    if (cloudPct >= 70)    parts.push('låg takthorisont');
    if (precip > 2)        parts.push('nedsatt sikt vid regn/snö');
    return parts.join(', ') + '.';
}

// CBRN assessment
function cbrnBedomning(windMs, windDir) {
    if (windMs < 2)  return 'Mycket svag vind – lokal ansamling av kemiska ämnen möjlig. Hög CBRN-risk vid markutsläpp.';
    if (windMs < 5)  return `Svag vind ${windDir}, långsam spridning och lokal ansamling vid markutsläpp.`;
    if (windMs < 10) return `Måttlig vind ${windDir}, normal spridning nedåt vindrogen. Övervaka vindriktning.`;
    return `Hård vind ${windDir}, snabb spridning nedåt vindrogen. Kontaminerat område utvidgas snabbt.`;
}

// Frost assessment
function frostBedomning(minTemp) {
    if (minTemp > 1) return null;
    if (minTemp <= 0) return `Frosthalka trolig under natten/morgonen, marktemperatur kring ${minTemp}°C.`;
    return `Frosthalka möjlig, marktemperatur nära 0°C (${minTemp}°C).`;
}

async function generera() {
    if (!datumVal) { alert('Tryck på "Nu" för att ange dagens datum.'); return; }
    const ortText = document.getElementById('ortInput').value.trim();
    if (!ortText && !latVal) { alert('Ange en ort eller tryck på 📍 MGRS.'); return; }

    const genBtn = document.querySelector('.btn-primary');
    genBtn.textContent = 'Hämtar väderdata…';
    genBtn.disabled = true;

    try {
        // Geocode text input if no GPS coords
        if (!latVal || !lonVal) {
            const geoResp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(ortText)}&limit=1`);
            const geoData = await geoResp.json();
            if (!geoData.length) throw new Error(`Hittade ingen plats för "${ortText}"`);
            latVal = parseFloat(geoData[0].lat);
            lonVal = parseFloat(geoData[0].lon);
        }
        ortVal = ortText || document.getElementById('ortInput').value.trim();

        const isoDate = toISODate(datumVal);
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${latVal.toFixed(4)}&longitude=${lonVal.toFixed(4)}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,cloudcover_mean,windspeed_10m_max,winddirection_10m_dominant,sunrise,sunset&timezone=auto&start_date=${isoDate}&end_date=${isoDate}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('API-fel ' + resp.status);
        const data = await resp.json();
        const d = data.daily;

        const tempMax    = Math.round(d.temperature_2m_max[0]);
        const tempMin    = Math.round(d.temperature_2m_min[0]);
        const precip     = d.precipitation_sum[0] ?? 0;
        const cloudPct   = Math.round(d.cloudcover_mean[0] ?? 0);
        const windMs     = Math.round(d.windspeed_10m_max[0] / 3.6); // km/h → m/s
        const windDeg    = d.winddirection_10m_dominant[0] ?? 0;
        const sunriseISO = d.sunrise[0];
        const sunsetISO  = d.sunset[0];

        const windDir  = vindRiktning(windDeg);
        const windDesc = vindBeskriv(windMs);
        const skyDesc  = molnBeskriv(cloudPct);

        // Precipitation text
        let nederbord = 'Ingen nederbörd';
        if (precip >= 0.1 && precip < 3)  nederbord = `Lätt nederbörd ${precip.toFixed(1)} mm`;
        else if (precip >= 3 && precip < 10) nederbord = `Måttlig nederbörd ${precip.toFixed(1)} mm`;
        else if (precip >= 10)             nederbord = `Kraftig nederbörd ${precip.toFixed(1)} mm`;

        const sunriseDDTTMM = toDDTTMM(sunriseISO);
        const sunsetDDTTMM  = toDDTTMM(sunsetISO);

        // Golden hour (only if cloud cover < 50%)
        let goldenLines = '';
        if (cloudPct < 50) {
            const ghMorgStart = toDDTTMM(sunriseISO);
            const ghMorgEnd   = toDDTTMM(addMinutes(sunriseISO, 30));
            const ghKvallStart = toDDTTMM(addMinutes(sunsetISO, -30));
            const ghKvallEnd   = toDDTTMM(sunsetISO);
            goldenLines = `Golden hour morgon ${ghMorgStart}–${ghMorgEnd}\nGolden hour kväll ${ghKvallStart}–${ghKvallEnd}`;
        }

        const uav   = uavBedomning(windMs, cloudPct, precip);
        const cbrn  = cbrnBedomning(windMs, windDir);
        const frost = frostBedomning(tempMin);

        let rapport = `Orientering:\nMeteorologisk prognos ${datumVal}\n\nTemp ${tempMin}–${tempMax}°C. ${skyDesc}. ${nederbord}.\n${windDesc} ${windMs} m/s från ${windDir}.\n\nSoluppgång ${sunriseDDTTMM}\nSolnedgång ${sunsetDDTTMM}\n\n${uav}\n${cbrn}`;
        if (frost) rapport += '\n' + frost;
        if (goldenLines) rapport += '\n\nFör fotografering;\n' + goldenLines;

        document.getElementById('promptOutput').textContent = rapport;
        document.getElementById('formView').classList.add('hidden');
        document.getElementById('resultView').classList.add('active');
        window.scrollTo(0, 0);
    } catch(err) {
        alert('Kunde inte hämta väderdata: ' + err.message);
    } finally {
        genBtn.textContent = 'Generera väderrapport';
        genBtn.disabled = false;
    }
}

function kopiera() {
    const el = document.getElementById('promptOutput');
    const text = el.innerText || el.textContent;
    const afterCopy = () => { showFeedback(); if (navigator.share) navigator.share({ text }).catch(() => {}); };
    if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(text).then(afterCopy).catch(() => fallback(text));
    } else { fallback(text); }
}
function fallback(text) {
    const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(_) {}
    document.body.removeChild(ta); showFeedback();
}
function showFeedback() {
    const el = document.getElementById('copyFeedback'); el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}
function atergaForm() {
    document.getElementById('resultView').classList.remove('active');
    document.getElementById('formView').classList.remove('hidden');
    window.scrollTo(0, 0);
}
function nollstall() {
    datumVal = ''; ortVal = ''; latVal = null; lonVal = null;
    document.getElementById('dispDatum').textContent = '— tryck Nu';
    document.getElementById('dispDatum').classList.add('empty');
    document.getElementById('ortInput').value = '';
    document.getElementById('resultView').classList.remove('active');
    document.getElementById('formView').classList.remove('hidden');
    window.scrollTo(0, 0);
}

// Reset GPS coords if user edits the location field manually
document.getElementById('ortInput').addEventListener('input', () => { latVal = null; lonVal = null; });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');

document.addEventListener('DOMContentLoaded', () => {
    const a = document.createElement('a');
    a.href = 'https://github.com/gitjoda71/faltrapport/issues/new?title=%5BBeta-Feedback%5D%20VADER&body=**Form%3A**%20VADER%0A%0A**Beskriv%20problemet%2Ff%C3%B6rslaget%3A**';
    a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.textContent = 'Bugg eller förslag? Lämna feedback →';
    a.style.cssText = 'display:block;text-align:center;padding:24px 0 12px;font-size:0.7rem;color:#5a7a5a;text-decoration:none';
    document.querySelector('.container')?.appendChild(a);
});
</script>
