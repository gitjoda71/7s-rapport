<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1f0d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VÄDER">

    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary:#0d1f0d;--bg-secondary:#152815;--bg-card:#1a321a;--bg-input:#0f240f;
            --border:#2d4a2d;--border-focus:#4a7c4a;--text-primary:#e8f0e8;--text-secondary:#8aaa8a;
            --text-muted:#5a7a5a;--accent:#4caf50;--accent-hover:#66bb6a;--accent-dim:#1e3d1e;
            --danger:#c62828;--info:#1565c0;--info-hover:#1976d2;
            --radius:8px;--radius-sm:4px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding: 16px; }
        .container { max-width: 560px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0 16px; }
        header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
        header p { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.06em; margin-top: 2px; }
        .tab-nav { display: flex; gap: 4px; margin-bottom: 4px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
        .tab-link { flex: 1; text-align: center; padding: 9px 2px; border-radius: var(--radius-sm); color: var(--text-muted); text-decoration: none; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; transition: background 0.15s, color 0.15s; -webkit-tap-highlight-color: transparent; }
        .tab-link:hover { background: var(--bg-card); color: var(--text-secondary); }
        .tab-link.active { background: var(--accent-dim); color: var(--accent); }
        .tab-nav-sub { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 4px; margin-bottom: 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
        .tab-nav-sub .tab-link { font-size: 0.75rem; padding: 9px 2px; letter-spacing: 0.05em; }
        .status-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
        .status-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
        .status-row:last-child { margin-bottom: 0; }
        .status-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); flex-shrink: 0; width: 60px; }
        .status-value { font-size: 0.92rem; font-family: 'Courier New', monospace; color: var(--text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .status-value.empty { color: var(--text-muted); font-style: italic; }
        .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 48px; padding: 12px 20px; border: none; border-radius: var(--radius); font-family: inherit; font-size: 0.95rem; font-weight: 600; letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s, transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { width: 100%; background: var(--accent); color: #fff; margin-top: 8px; font-size: 1rem; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-sm { min-height: 44px; padding: 10px 18px; border-radius: var(--radius-sm); font-size: 0.88rem; white-space: nowrap; flex-shrink: 0; }
        .btn-time { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--border); }
        .btn-time:hover { background: var(--border-focus); }
        .btn-copy { width: 100%; background: var(--info); color: #fff; margin-bottom: 12px; }
        .btn-copy:hover { background: var(--info-hover); }
        .btn-secondary { flex: 1; background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-danger { flex: 1; background: var(--danger); color: #fff; border: none; }
        .button-group { display: flex; gap: 10px; }
        .copy-feedback { text-align: center; color: var(--accent); font-size: 0.85rem; font-weight: 600; height: 24px; opacity: 0; transition: opacity 0.2s; margin-bottom: 12px; }
        .copy-feedback.show { opacity: 1; }
        .prompt-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-family: 'Courier New', monospace; font-size: 0.82rem; line-height: 1.7; white-space: pre-wrap; color: var(--text-primary); margin-bottom: 14px; user-select: all; }
        .result-view { display: none; }
        .result-view.active { display: block; }
        .form-view.hidden { display: none; }
        .result-header { font-size: 0.8rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); text-align: center; margin-bottom: 12px; }
        .hint { font-size: 0.72rem; color: var(--text-muted); text-align: center; margin-bottom: 14px; line-height: 1.5; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>VÄDER</h1><p>Meteorologisk prognos – militärt format</p></header>

    <nav class="tab-nav">
        <a href="index.html" class="tab-link">7S</a>
        <a href="what.html" class="tab-link">WHAT</a>
        <a href="scrim.html" class="tab-link">SCRIM</a>
        <a href="weft.html" class="tab-link">WEFT</a>
        <a href="ah.html" class="tab-link">A–H</a>
    </nav>
    <nav class="tab-nav-sub">
        <a href="obslosa.html" class="tab-link">OBSLÖSA</a>
        <a href="fors.html" class="tab-link">FORS</a>
        <a href="pedars.html" class="tab-link">PEDARS</a>
        <a href="postschema.html" class="tab-link">SCHEMA</a>
        <a href="eobusare.html" class="tab-link">EOBUSARE</a>
        <a href="obo.html" class="tab-link">OBO</a>
        <a href="rassoika.html" class="tab-link">RASSOIKA</a>
        <a href="vader.html" class="tab-link active">VÄDER</a>
    </nav>

    <main>
    <div class="form-view" id="formView">

        <div class="status-box">
            <div class="status-row">
                <span class="status-label">DATUM</span>
                <span class="status-value empty" id="dispDatum">— tryck Nu</span>
                <button class="btn btn-sm btn-time" onclick="setNu()">Nu</button>
            </div>
            <div class="status-row">
                <span class="status-label">ORT</span>
                <span class="status-value empty" id="dispOrt">— tryck MGRS</span>
                <button class="btn btn-sm btn-time" id="mgrsBtn" onclick="hamtaOrt()">MGRS</button>
            </div>
        </div>

        <button class="btn btn-primary" onclick="generera()">Generera väderrapport</button>
    </div>

    <div class="result-view" id="resultView">
        <div class="result-header">VÄDERRAPPORT – PROMPT</div>
        <p class="hint">Klistra in texten nedan i en AI-assistent (Claude, ChatGPT m.fl.) för att få prognosengenerad.</p>
        <button class="btn btn-copy" onclick="kopiera()">Kopiera prompt</button>
        <div class="copy-feedback" id="copyFeedback">✓ Kopierat</div>
        <div class="prompt-box" id="promptOutput"></div>
        <div class="button-group" style="margin-top:8px">
            <button class="btn btn-secondary" onclick="atergaForm()">Ändra</button>
            <button class="btn btn-danger" onclick="nollstall()">Nollställ</button>
        </div>
    </div>

    </main>
</div>

<script>
let datumVal = '';
let ortVal   = '';

function setNu() {
    const now = new Date();
    const p = n => String(n).padStart(2, '0');
    const yy = String(now.getFullYear()).slice(2);
    datumVal = yy + p(now.getMonth() + 1) + p(now.getDate());
    const el = document.getElementById('dispDatum');
    el.textContent = datumVal;
    el.classList.remove('empty');
}

function hamtaOrt() {
    const btn = document.getElementById('mgrsBtn');
    const el  = document.getElementById('dispOrt');
    btn.textContent = '…';
    btn.disabled = true;
    if (!navigator.geolocation) {
        el.textContent = 'Geolokalisering ej tillgänglig';
        el.classList.add('empty');
        btn.textContent = 'MGRS'; btn.disabled = false; return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude.toFixed(5);
        const lon = pos.coords.longitude.toFixed(5);
        // Försök reverse-geocode via Nominatim (kräver nätverksåtkomst)
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=sv`)
            .then(r => r.json())
            .then(d => {
                const city = d.address?.city || d.address?.town || d.address?.village || d.address?.county || `${lat}, ${lon}`;
                ortVal = city;
                el.textContent = city;
                el.classList.remove('empty');
            })
            .catch(() => {
                ortVal = `${lat}, ${lon}`;
                el.textContent = ortVal;
                el.classList.remove('empty');
            })
            .finally(() => { btn.textContent = 'MGRS'; btn.disabled = false; });
    }, () => {
        el.textContent = 'Kunde inte hämta position';
        el.classList.add('empty');
        btn.textContent = 'MGRS'; btn.disabled = false;
    });
}

function generera() {
    if (!datumVal) { alert('Tryck på "Nu" för att ange dagens datum.'); return; }
    const ort = ortVal || 'Stockholm';
    const prompt =
`Du är en militär väderassistent. Skapa en kortfattad meteorologisk prognos för ${ort} för datum ${datumVal}. Använd exakt följande format:

Orientering:
Meteorologisk prognos ${datumVal}
Temp [min]–[max]°C. [Väderförhållanden]. [Nederbörd].
[Vindstyrka och riktning].
Soluppgång [DDTTMM]
Solnedgång [DDTTMM]
Om soligt/klart väder, inkludera:
Golden hour morgon [DDTTMM]–[DDTTMM], för fotografering.
Golden hour kväll [DDTTMM]–[DDTTMM], för fotografering.
Om molntäcke, utelämna Golden Hour helt.
[Sikt och UAV-påverkan].
[CBRN-påverkan baserat på vindförhållanden och spridningsrisk].
[Frosthalka och marktemperatur].

Regler:
- Datum skrivs ÅÅMMDD (ex: 260321)
- Tider skrivs DDTTMM (ex: 210546)
- Ingen punkt efter solnedgångstidenInkludera påverkan på militär verksamhet (UAV, CBRN)
- Håll det kortfattat, inga kartor
- Sök aktuell väderdata från webben innan du svarar
- Sök golden hour-tider för ${ort} datum ${datumVal} från webbkälla (golden-hour.com eller liknande), uppskatta inte`;

    document.getElementById('promptOutput').textContent = prompt;
    document.getElementById('formView').classList.add('hidden');
    document.getElementById('resultView').classList.add('active');
    window.scrollTo(0, 0);
}

function kopiera() {
    const text = document.getElementById('promptOutput').textContent;
    if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(text).then(showFeedback).catch(() => fallback(text));
    } else { fallback(text); }
}
function fallback(text) {
    const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(_) {}
    document.body.removeChild(ta); showFeedback();
}
function showFeedback() {
    const el = document.getElementById('copyFeedback'); el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}
function atergaForm() {
    document.getElementById('resultView').classList.remove('active');
    document.getElementById('formView').classList.remove('hidden');
    window.scrollTo(0, 0);
}
function nollstall() {
    datumVal = ''; ortVal = '';
    document.getElementById('dispDatum').textContent = '— tryck Nu';
    document.getElementById('dispDatum').classList.add('empty');
    document.getElementById('dispOrt').textContent = '— tryck MGRS';
    document.getElementById('dispOrt').classList.add('empty');
    document.getElementById('resultView').classList.remove('active');
    document.getElementById('formView').classList.remove('hidden');
    window.scrollTo(0, 0);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');

document.addEventListener('DOMContentLoaded', () => {
    const a = document.createElement('a');
    a.href = 'https://github.com/gitjoda71/faltrapport/issues/new?title=%5BBeta-Feedback%5D%20VADER&body=**Form%3A**%20VADER%0A%0A**Beskriv%20problemet%2Ff%C3%B6rslaget%3A**';
    a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.textContent = 'Bugg eller förslag? Lämna feedback →';
    a.style.cssText = 'display:block;text-align:center;padding:24px 0 12px;font-size:0.7rem;color:#5a7a5a;text-decoration:none';
    document.querySelector('.container')?.appendChild(a);
});
</script>
<script src="version.js"></script>
</body>
</html>
